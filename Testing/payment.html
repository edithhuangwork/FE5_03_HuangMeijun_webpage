<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="payment.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Secure Payment</title>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <h2><i class="fas fa-lock"></i> Secure Payment</h2>
            <div class="total-amount">HKD 1,280.00</div>
        </div>

        <div class="payment-methods" id="paymentMethods">
            <div class="method-card visa" data-method="visa" tabindex="0">
                <div class="method-icon">
                    <i class="fab fa-cc-visa"></i>
                </div>
                <span>VISA</span>
                <div class="checkmark">✓</div>
            </div>
            
            <div class="method-card mastercard" data-method="mastercard" tabindex="0">
                <div class="method-icon">
                    <i class="fab fa-cc-mastercard"></i>
                </div>
                <span>Mastercard</span>
                <div class="checkmark">✓</div>
            </div>
            
            <div class="method-card alipay" data-method="alipay" tabindex="0">
                <div class="method-icon">
                    <i class="fab fa-alipay"></i>
                </div>
                <span>Alipay</span>
                <div class="checkmark">✓</div>
            </div>
            
            <div class="method-card payme" data-method="payme" tabindex="0">
                <div class="method-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <span>PayMe</span>
                <div class="checkmark">✓</div>
            </div>
            
            <div class="method-card applepay" data-method="applepay" tabindex="0">
                <div class="method-icon">
                    <i class="fab fa-apple-pay"></i>
                </div>
                <span>Apple Pay</span>
                <div class="checkmark">✓</div>
            </div>
        </div>

        <div class="card-details" id="cardDetails">
            <div class="input-group">
                <label>Card Number</label>
                <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Expiry Date</label>
                    <input type="text" id="expiryDate" placeholder="MM/YY" maxlength="5">
                </div>
                <div class="input-group">
                    <label>CVV</label>
                    <input type="password" id="cvv" placeholder="123" maxlength="4">
                </div>
            </div>
            <div class="input-group">
                <label>Cardholder Name</label>
                <input type="text" id="cardName" placeholder="JOHN DOE">
            </div>
        </div>

        <div class="quick-pay" id="quickPay">
            <button class="pay-now-btn" id="payNowBtn">
                <i class="fas fa-bolt"></i> Pay Now HKD 1,280
            </button>
        </div>

        <div class="security-info">
            <i class="fas fa-shield-alt"></i>
            <span>Your payment is secured with 256-bit SSL encryption</span>
        </div>

        <button class="confirm-btn" id="confirmBtn">
            Select Payment Method
        </button>
    </div>

    <script src="payment.js"></script>
</body>
</html>
