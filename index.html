<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./index.css">
    <title>Home - PathPals</title>
</head>
<body>
<nav class="navbar">
    <div class="containter navbar-flex">
        <div class="logo-section">
        <img src="./logo_icon.png" alt="PathPals Logo" class="logo-icon">
        <span class="logo-text">PathPals</span>
        </div>
        <div class="main-menu">
            <ul class="main-menu-list">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Kyoto</a></li>
            <li><a href="#">Paris</a></li>
            <li><a href="#">Milan</a></li>
            <li><a href="#">Cairo</a></li>
            <li><a href="#contact">Contact Us</a></li>
            </ul>
        </div>
        <div class="mobile-menu">
            <div class="mobile-menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="mobile-menu-items">
                <ul class="mobile-menu-list">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Kyoto</a></li>
                <li><a href="#">Paris</a></li>
                <li><a href="#">Milan</a></li>
                <li><a href="#">Cairo</a></li>
                <li><a href="#contact">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<footer id="contact">
    <h3>✉️ Contact Us ✉️</h3>
    <form id="contact-form">
        <div class="form-group details">
            <label for="name">Name</label>
            <input 
                type="text" 
                id="name" 
                name="name" 
                placeholder="Enter your name" 
                minlength="5" 
                maxlength="25"
                required
            />
        </div>
        <div class="form-group details">
            <label for="email">Email</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="Enter your email"
                required
            />
        </div>
        <div class="form-group details">
            <label for="message">Message</label>
            <textarea
                name="message" 
                id="message" 
                placeholder="Enter your message" 
                rows="4"
                cols="40"
                style="resize:none"
                required
            ></textarea>
        </div>
        <div class="form-group">
            <button type="submit">Send Message</button>
        </div>
    </form>
    <p>© Copyright 2026 PathPals Limited. All rights reserved</p>
</footer>

<script src="./index.js"></script>
</body>
</html>
