<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/footer.css">
  <title>Footer</title>
</head>
<body>
  <footer id="contact">
    <div class="footer-section">
      <h3>✉️ Contact Us ✉️</h3>
      <div class="footer-content">
        <div class="contact-info">
          <div class="location">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d29529.003910909636!2d114.18695926666257!3d22.311093357832323!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x34040145637b41a7%3A0xab827da0184aef07!2sHKCT%20Kwun%20Tong%20Learning%20Centre!5e0!3m2!1sen!2shk!4v1774802274596!5m2!1sen!2shk" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
          <div class="information">
            <h4>Get in Touch</h4>
            <p class="info-tel">+852 2926 1222</p>
            <p class="info-fax">+852 2713 7018</p>
            <p class="info-email">
            <a href="mailto:enquiry@hkct.edu.hk">enquiry@hkct.edu.hk</a>
            </p>
            <p class="info-msg">
            <a href="https://api.whatsapp.com/send?phone=85263004855" >+852 6300 4855</a>
            </p>
          </div>
        </div>
        <div class="contact-form">
        <h4>Enquiry</h4>
        <form>
            <div class="form-group details">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your name"
              minlength="5"
              maxlength="25"
              required/>
            </div>
            <div class="form-group details">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required/>
            </div>
            <div class="form-group details">
            <label for="message">Message</label>
            <textarea
              name="message"
              id="message"
              placeholder="Enter your message"
              rows="4"
              cols="40"
              style="resize: none"
              required></textarea>
            </div>
            <div class="form-group">
            <button type="submit">Send Message</button>
            </div>
        </form>
        </div>
      </div>
      <audio controls autoplay loop>
        <source src="/assets/song.mp3" type="audio/mp3" />
      </audio>
      <p>
        © Copyright <span id="copyright-year"></span> PathPals Limited. All
        rights reserved
      </p>
    </div>
</footer>
</body>
</html>
